<!DOCTYPE html>
<html>
<head>
    <title>NEXA Heatmap</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="heatmap.html">Heatmap</a>
    <a href="ai.html">AI</a>
</div>

<h2>🌍 Risk Heatmap</h2>

<div id="map" class="card">Loading...</div>

<script src="app.js"></script>

<script>
async function loadHeatmap() {

    const data = await getData("/heatmap");

    let html = "";

    data.heatmap.forEach(z => {

        html += `
            <div style="margin:10px; padding:10px; border-left:5px solid ${z.color}">
                📍 ${z.zone} - ${z.level} (${z.score})
            </div>
        `;
    });

    document.getElementById("map").innerHTML = html;
}

loadHeatmap();
setInterval(loadHeatmap, 5000);
</script>

</body>
</html>
