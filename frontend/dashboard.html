<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NEXA SAFETY - Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #38bdf8;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .logout {
            background: red;
            color: white;
        }

        .primary {
            background: #38bdf8;
            color: black;
        }

        .container {
            margin-top: 20px;
        }

        #stats {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        #riskContainer {
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .level-high {
            border-left: 5px solid red;
        }

        .level-medium {
            border-left: 5px solid orange;
        }

        .level-low {
            border-left: 5px solid green;
        }

        .actions {
            margin-top: 15px;
        }

        .empty {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>✈️ NEXA SAFETY Dashboard</h1>

        <div>
            <button class="btn primary" onclick="goIncident()">➕ Report Incident</button>
            <button class="btn logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="container">

        <!-- KPI STATS -->
        <div id="stats">
            <p class="empty">Loading dashboard...</p>
        </div>

        <!-- RISK ENGINE -->
        <div id="riskContainer">
            <p class="empty">Loading risk analysis...</p>
        </div>

    </div>

    <!-- SCRIPT -->
    <script src="/app.js"></script>

    <!-- NAVIGATION FIX -->
    <script>
        function goIncident() {
            window.location.href = "/incident.html";
        }
    </script>

</body>

</html>
