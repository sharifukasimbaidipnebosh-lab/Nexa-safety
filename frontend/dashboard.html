<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NEXA SAFETY - Executive Dashboard</title>

    <!-- CHART.JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #38bdf8;
        }

        .btn {
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-left: 5px;
        }

        .primary { background: #38bdf8; }
        .logout { background: red; color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        canvas {
            max-height: 250px;
        }
    </style>
</head>

<body>

<header>
    <h1>✈️ NEXA SAFETY Executive Dashboard</h1>
    <div>
        <button class="btn primary" onclick="goIncident()">➕ Incident</button>
        <button class="btn logout" onclick="logout()">Logout</button>
    </div>
</header>

<div class="grid">

    <!-- KPI -->
    <div class="card">
        <h3>📊 KPI Overview</h3>
        <div id="stats"></div>
    </div>

    <!-- PIE CHART -->
    <div class="card">
        <h3>📈 Incident Distribution</h3>
        <canvas id="severityChart"></canvas>
    </div>

    <!-- BAR CHART -->
    <div class="card">
        <h3>⚠ Risk Levels</h3>
        <canvas id="riskChart"></canvas>
    </div>

</div>

<script src="/app.js"></script>

<script>
function goIncident() {
    window.location.href = "/incident.html";
}
</script>

</body>
</html>
